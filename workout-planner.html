<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){if(localStorage.getItem('exercisedb_theme')==='light')document.documentElement.classList.add('light-theme');})();</script>
<title>WorkoutPlanner</title>
<style>
:root {
  --bg:#0f1117;--surface:#181c25;--card:#1e2333;--border:#2a3045;
  --accent:#f97316;--accent2:#fb923c;--text:#e8eaf0;--muted:#8892a4;
  --danger:#ef4444;--success:#22c55e;--radius:10px;
  --font:'Inter',system-ui,sans-serif;
}
html.light-theme {
  --bg:#f4f4f5;--surface:#ffffff;--card:#f0f0f1;--border:#e4e4e7;
  --text:#111111;--muted:#71717a;
}
html.light-theme body { color: var(--text); }
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;line-height:1.5}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
header .logo{font-weight:800;font-size:1.15rem;letter-spacing:-0.02em;color:var(--accent)}
header .logo span{color:var(--text)}
header nav{margin-left:auto;display:flex;gap:4px}
header nav button{background:none;border:none;color:var(--muted);font-size:0.85rem;padding:6px 14px;border-radius:6px;cursor:pointer;font-family:var(--font);transition:all .15s}
header nav button.active,header nav button:hover{background:var(--card);color:var(--text)}
header nav button.active{color:var(--accent);font-weight:600}
.theme-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}
.theme-btn svg{width:16px;height:16px}
.icon-sun{display:none}
html.light-theme .icon-moon{display:none}
html.light-theme .icon-sun{display:block}
.app{display:flex;height:calc(100vh - 60px)}
.sidebar{width:300px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:14px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.sidebar-header h2{font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted)}
.search-input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:var(--radius);font-size:0.875rem;font-family:var(--font);outline:none;transition:border-color .15s}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:var(--accent)}
.filter-row{display:flex;gap:5px;flex-wrap:wrap}
.filter-chip{background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:0.72rem;padding:3px 9px;border-radius:20px;cursor:pointer;transition:all .15s;white-space:nowrap}
.filter-chip:hover{border-color:var(--accent);color:var(--text)}
.filter-chip.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.exercises-list{flex:1;overflow-y:auto;padding:6px}
.exercises-list::-webkit-scrollbar{width:4px}
.exercises-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.ex-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:default;transition:background .12s;border:1px solid transparent}
.ex-item:hover{background:var(--card);border-color:var(--border)}
.ex-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--accent)}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:0.83rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-meta{font-size:0.7rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.add-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--accent);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;line-height:1}
.add-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.list-count{padding:5px 12px;font-size:0.7rem;color:var(--muted);text-align:center;border-top:1px solid var(--border)}
.main{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:18px}
.main::-webkit-scrollbar{width:5px}
.main::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.week-strip{display:flex;gap:6px}
.day-btn{flex:1;padding:10px 4px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:0.75rem;font-weight:600;text-align:center;cursor:pointer;transition:all .15s;position:relative;font-family:var(--font)}
.day-btn:hover{border-color:var(--accent);color:var(--text)}
.day-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.day-badge{position:absolute;top:-6px;right:-6px;background:var(--accent2);color:#fff;border-radius:10px;font-size:0.62rem;font-weight:700;padding:1px 5px;min-width:17px;text-align:center}
.day-btn.active .day-badge{background:#fff;color:var(--accent)}
.day-settings{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.day-settings h3{font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);margin-bottom:10px}
.settings-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.setting-field{display:flex;align-items:center;gap:7px;flex:1;min-width:150px}
.setting-field label{font-size:0.78rem;color:var(--muted);white-space:nowrap;min-width:80px}
.setting-field input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:6px;font-size:0.85rem;font-family:var(--font);outline:none;transition:border-color .15s;min-width:0}
.setting-field input:focus{border-color:var(--accent)}
.setting-field .unit{font-size:0.72rem;color:var(--muted)}
.rest-display{font-size:0.83rem;font-weight:600;color:var(--accent);padding:6px 10px;background:var(--card);border-radius:6px;border:1px solid var(--border);white-space:nowrap}
.routine-header{display:flex;align-items:center;justify-content:space-between}
.routine-title{font-size:1.05rem;font-weight:700;letter-spacing:-0.02em}
.routine-title .day-name{color:var(--accent)}
.clear-btn{font-size:0.76rem;color:var(--danger);background:none;border:1px solid transparent;padding:5px 10px;border-radius:6px;cursor:pointer;font-family:var(--font);transition:all .12s}
.clear-btn:hover{border-color:var(--danger);background:rgba(239,68,68,.08)}
.routine-list{display:flex;flex-direction:column;gap:7px}
.routine-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:10px;transition:border-color .12s;user-select:none}
.routine-card:hover{border-color:var(--accent)}
.routine-card.drag-over{border-color:var(--accent);background:rgba(249,115,22,.06)}
.drag-handle{color:var(--border);cursor:grab;font-size:1rem;flex-shrink:0;padding:2px 4px;line-height:1}
.drag-handle:active{cursor:grabbing}
.ex-number{width:24px;height:24px;border-radius:50%;background:rgba(249,115,22,.15);color:var(--accent);font-size:0.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-name{font-size:0.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:0.7rem;color:var(--muted);margin-top:1px}
.card-controls{display:flex;align-items:center;gap:7px;flex-shrink:0}
.mini-field{display:flex;flex-direction:column;align-items:center;gap:2px}
.mini-field label{font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-weight:600}
.mini-field input{width:50px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:4px 5px;border-radius:6px;font-size:0.82rem;font-family:var(--font);text-align:center;outline:none;transition:border-color .12s}
.mini-field input:focus{border-color:var(--accent)}
.remove-card{width:26px;height:26px;border-radius:6px;border:1px solid transparent;background:none;color:var(--muted);font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.remove-card:hover{background:rgba(239,68,68,.1);border-color:var(--danger);color:var(--danger)}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;gap:10px;border:2px dashed var(--border);border-radius:var(--radius);background:var(--surface)}
.empty-state .empty-icon{font-size:2.5rem}
.empty-state .empty-title{font-size:0.95rem;font-weight:600}
.empty-state .empty-sub{font-size:0.8rem;color:var(--muted);max-width:260px}
.routine-summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;display:flex;gap:20px;flex-wrap:wrap}
.summary-item{display:flex;flex-direction:column;gap:2px}
.s-label{font-size:0.68rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.07em}
.s-value{font-size:1.05rem;font-weight:700;color:var(--accent)}
.s-unit{font-size:0.68rem;color:var(--muted)}
.overview-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.overview-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.overview-col.has-workouts{border-color:rgba(249,115,22,.3)}
.overview-col-header{padding:8px 10px 6px;border-bottom:1px solid var(--border);background:var(--card)}
.day-label-ov{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted)}
.overview-col.has-workouts .day-label-ov{color:var(--accent)}
.day-count{font-size:1.1rem;font-weight:800;color:var(--text);line-height:1;margin-top:3px}
.day-count-label{font-size:0.62rem;color:var(--muted)}
.overview-exercises{padding:6px;display:flex;flex-direction:column;gap:3px}
.overview-ex-item{font-size:0.7rem;padding:3px 5px;border-radius:4px;background:var(--card);color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:2px solid var(--accent)}
.overview-ex-item .ex-sets{color:var(--muted)}
.overview-rest{font-size:0.66rem;color:var(--muted);padding:3px 8px 7px;display:flex;gap:6px}
.overview-rest span{background:var(--card);padding:2px 5px;border-radius:3px}
.rest-tag{color:var(--accent)!important;font-weight:600}
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);color:var(--text);padding:9px 14px;border-radius:8px;font-size:0.82rem;font-weight:500;z-index:9999;opacity:0;transform:translateY(10px);transition:all .22s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
@media(max-width:900px){.sidebar{width:260px}.overview-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

<header>
  <div class="logo">💪 <span>WorkoutPlanner</span></div>

</header>

  <main class="main" id="mainArea"></main>
</div>

const DAYS=['SEG','TER','QUA','QUI','SEX','SÁB','DOM'];
const DAY_LABELS=['Segunda','Terça','Quarta','Quinta','Sexta','Sábado','Domingo'];
const SK='workout_v3';
let routine=loadRoutine();
let activeDay=0,activeTab='planner',filterCat='all',dragSrc=null;

function loadRoutine(){
  try{const r=localStorage.getItem(SK);if(r){const p=JSON.parse(r);while(p.length<7)p.push({exercises:[],sets:3,reps:12,rest:60});return p.slice(0,7);}}catch(e){}
  return Array.from({length:7},()=>({exercises:[],sets:3,reps:12,rest:60}));
}
function save(){localStorage.setItem(SK,JSON.stringify(routine));}

function switchTab(t){
  activeTab=t;
  document.getElementById('tab-planner').classList.toggle('active',t==='planner');
  document.getElementById('tab-overview').classList.toggle('active',t==='overview');
  render();
}

// Build category filters
(function(){
  const cats=['all',...new Set(ALL_EXERCISES.map(e=>e.cat))].sort((a,b)=>a==='all'?-1:a.localeCompare(b));
  document.getElementById('catFilters').innerHTML=cats.map(c=>
    `<button class="filter-chip ${c==='all'?'active':''}" onclick="setCat('${c}')">${c==='all'?'Todos':cap(c)}</button>`
  ).join('');
})();

function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

function setCat(c){
  filterCat=c;
  document.querySelectorAll('.filter-chip').forEach(b=>{
    b.classList.toggle('active',b.textContent===(c==='all'?'Todos':cap(c)));
  });
  renderExList();
}

function renderExList(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const filtered=ALL_EXERCISES.filter(e=>{
    const mc=filterCat==='all'||e.cat===filterCat;
    const mq=!q||e.name.toLowerCase().includes(q)||(e.tgt||'').toLowerCase().includes(q)||(e.eq||'').toLowerCase().includes(q);
    return mc&&mq;
  });
  const shown=filtered.slice(0,150);
  document.getElementById('exList').innerHTML=shown.map(e=>
    `<div class="ex-item">
      <div class="ex-dot"></div>
      <div class="ex-info">
        <div class="ex-name" title="${e.name}">${e.name}</div>
        <div class="ex-meta">${cap(e.cat)} · ${e.tgt?cap(e.tgt):''} · ${e.eq}</div>
      </div>
      <button class="add-btn" onclick="addEx('${e.id}')" title="Adicionar">+</button>
    </div>`
  ).join('');
  document.getElementById('listCount').textContent=
    filtered.length>150?`Mostrando 150 de ${filtered.length}`:`${filtered.length} exercício${filtered.length!==1?'s':''}`;
}

function addEx(id){
  const ex=ALL_EXERCISES.find(e=>e.id===id);
  if(!ex)return;
  const day=routine[activeDay];
  if(day.exercises.some(e=>e.id===id)){showToast(`${ex.name} já está no treino!`);return;}
  day.exercises.push({id,name:ex.name,cat:ex.cat,tgt:ex.tgt,eq:ex.eq,sets:day.sets,reps:day.reps});
  save();render();showToast(`${ex.name} adicionado!`);
}

function removeEx(i){routine[activeDay].exercises.splice(i,1);save();render();}

function clearDay(){
  if(!confirm(`Limpar todos os exercícios de ${DAY_LABELS[activeDay]}?`))return;
  routine[activeDay].exercises=[];save();render();
}

function updateDaySetting(f,v){
  routine[activeDay][f]=parseInt(v)||0;save();
  // update rest display only
  const d=routine[activeDay];
  const el=document.getElementById('restDisplay');
  if(el)el.textContent=fmtRest(d.rest);
}

function updateExField(i,f,v){
  routine[activeDay].exercises[i][f]=parseInt(v)||0;save();
  updateBadges();updateSummary();
}

function fmtRest(s){
  const m=Math.floor(s/60),r=s%60;
  return m>0?`${m}min${r>0?' '+r+'s':''}`:s+'s';
}

function updateBadges(){
  document.querySelectorAll('.day-btn').forEach((b,i)=>{
    const cnt=routine[i].exercises.length;
    let badge=b.querySelector('.day-badge');
    if(cnt>0){
      if(!badge){badge=document.createElement('span');badge.className='day-badge';b.appendChild(badge);}
      badge.textContent=cnt;
    } else if(badge){badge.remove();}
  });
}

function updateSummary(){
  const d=routine[activeDay];const exs=d.exercises;
  const el=document.getElementById('summaryBox');
  if(!el||exs.length===0)return;
  const ts=exs.reduce((a,e)=>a+(parseInt(e.sets)||d.sets),0);
  const tr=exs.reduce((a,e)=>a+(parseInt(e.sets)||d.sets)*(parseInt(e.reps)||d.reps),0);
  const rm=Math.round((ts-exs.length)*d.rest/60);
  el.innerHTML=`
    <div class="summary-item"><div class="s-label">Exercícios</div><div class="s-value">${exs.length}</div></div>
    <div class="summary-item"><div class="s-label">Total séries</div><div class="s-value">${ts}</div></div>
    <div class="summary-item"><div class="s-label">Total reps</div><div class="s-value">${tr}</div></div>
    <div class="summary-item"><div class="s-label">Descanso est.</div><div class="s-value">${rm}</div><div class="s-unit">minutos</div></div>
    <div class="summary-item"><div class="s-label">Entre séries</div><div class="s-value">${fmtRest(d.rest)}</div></div>`;
}

function render(){
  if(activeTab==='planner')renderPlanner();
  else renderOverview();
}

function selectDay(i){activeDay=i;render();}

function renderPlanner(){
  const m=document.getElementById('mainArea');
  const d=routine[activeDay];const exs=d.exercises;

  const strip=DAYS.map((day,i)=>{
    const cnt=routine[i].exercises.length;
    return `<button class="day-btn ${i===activeDay?'active':''}" onclick="selectDay(${i})">
      ${cnt>0?`<span class="day-badge">${cnt}</span>`:''}${day}</button>`;
  }).join('');

  const settings=`<div class="day-settings">
    <h3>Configurações do dia — ${DAY_LABELS[activeDay]}</h3>
    <div class="settings-row">
      <div class="setting-field">
        <label>Séries padrão</label>
        <input type="number" min="1" max="20" value="${d.sets}"
          oninput="updateDaySetting('sets',this.value)" onchange="updateDaySetting('sets',this.value)">
        <span class="unit">séries</span>
      </div>
      <div class="setting-field">
        <label>Reps padrão</label>
        <input type="number" min="1" max="100" value="${d.reps}"
          oninput="updateDaySetting('reps',this.value)" onchange="updateDaySetting('reps',this.value)">
        <span class="unit">reps</span>
      </div>
      <div class="setting-field">
        <label>Descanso (seg)</label>
        <input type="number" min="5" max="600" step="5" value="${d.rest}"
          oninput="updateDaySetting('rest',this.value)" onchange="updateDaySetting('rest',this.value)">
        <span class="rest-display" id="restDisplay">${fmtRest(d.rest)}</span>
      </div>
    </div>
  </div>`;

  let cards='';
  if(exs.length===0){
    cards=`<div class="empty-state">
      <div class="empty-icon">🏋️</div>
      <div class="empty-title">Nenhum exercício ainda</div>
      <div class="empty-sub">Selecione exercícios na lista à esquerda para montar seu treino de ${DAY_LABELS[activeDay]}.</div>
    </div>`;
  } else {
    cards=`<div class="routine-list" id="routineList">`+
      exs.map((e,i)=>`
        <div class="routine-card" draggable="true" data-idx="${i}"
          ondragstart="dStart(event,${i})" ondragover="dOver(event,${i})" ondrop="dDrop(event,${i})" ondragend="dEnd()">
          <span class="drag-handle" title="Arrastar">⠿</span>
          <div class="ex-number">${i+1}</div>
          <div class="card-info">
            <div class="card-name">${e.name}</div>
            <div class="card-meta">${cap(e.cat||'')} · ${cap(e.tgt||'')} · ${e.eq||''}</div>
          </div>
          <div class="card-controls">
            <div class="mini-field">
              <label>Séries</label>
              <input type="number" min="1" max="20" value="${e.sets||d.sets}"
                onchange="updateExField(${i},'sets',this.value)" oninput="updateExField(${i},'sets',this.value)">
            </div>
            <div class="mini-field">
              <label>Reps</label>
              <input type="number" min="1" max="100" value="${e.reps||d.reps}"
                onchange="updateExField(${i},'reps',this.value)" oninput="updateExField(${i},'reps',this.value)">
            </div>
            <button class="remove-card" onclick="removeEx(${i})" title="Remover">✕</button>
          </div>
        </div>`).join('')+`</div>`;
  }

  const hdr=`<div class="routine-header">
    <div class="routine-title">Treino de <span class="day-name">${DAY_LABELS[activeDay]}</span></div>
    ${exs.length>0?`<button class="clear-btn" onclick="clearDay()">Limpar dia</button>`:''}
  </div>`;

  const summary=exs.length>0?`<div class="routine-summary" id="summaryBox"></div>`:'';

  m.innerHTML=`<div class="week-strip">${strip}</div>${settings}${hdr}${cards}${summary}`;
  if(exs.length>0)updateSummary();
}

function renderOverview(){
  const m=document.getElementById('mainArea');
  const total=routine.filter(d=>d.exercises.length>0).length;
  const totEx=routine.reduce((a,d)=>a+d.exercises.length,0);
  const totSets=routine.reduce((a,d)=>a+d.exercises.reduce((b,e)=>b+(parseInt(e.sets)||d.sets),0),0);
  const cols=DAYS.map((day,i)=>{
    const d=routine[i];const exs=d.exercises;const has=exs.length>0;
    return `<div class="overview-col ${has?'has-workouts':''}">
      <div class="overview-col-header">
        <div class="day-label-ov">${DAY_LABELS[i]}</div>
        <div class="day-count">${exs.length}</div>
        <div class="day-count-label">${exs.length===1?'exercício':'exercícios'}</div>
      </div>
      ${has?`<div class="overview-exercises">${exs.map(e=>`<div class="overview-ex-item" title="${e.name}">${e.name} <span class="ex-sets">${e.sets||d.sets}×${e.reps||d.reps}</span></div>`).join('')}</div>
      <div class="overview-rest"><span class="rest-tag">⏱ ${fmtRest(d.rest)}</span><span>${d.sets}s·${d.reps}r</span></div>`:
      `<div style="padding:12px;font-size:0.73rem;color:var(--muted);text-align:center">Descanso</div>`}
    </div>`;
  }).join('');
  m.innerHTML=`
    <div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:4px">
      <div class="summary-item" style="padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)"><div class="s-label">Dias ativos</div><div class="s-value">${total} <span style="font-size:.7rem;color:var(--muted);font-weight:400">/ 7</span></div></div>
      <div class="summary-item" style="padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)"><div class="s-label">Total exercícios</div><div class="s-value">${totEx}</div></div>
      <div class="summary-item" style="padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)"><div class="s-label">Séries / semana</div><div class="s-value">${totSets}</div></div>
    </div>
    <div class="overview-grid">${cols}</div>`;
}

// Drag & Drop
function dStart(e,i){dragSrc=i;e.currentTarget.style.opacity='0.4';e.dataTransfer.effectAllowed='move';}
function dOver(e,i){e.preventDefault();if(i!==dragSrc){document.querySelectorAll('.routine-card').forEach((c,idx)=>{c.classList.toggle('drag-over',idx===i&&idx!==dragSrc);});}}
function dDrop(e,i){
  e.preventDefault();
  if(dragSrc===null||dragSrc===i)return;
  const exs=routine[activeDay].exercises;
  const [m]=exs.splice(dragSrc,1);exs.splice(i,0,m);
  save();render();
}
function dEnd(){dragSrc=null;document.querySelectorAll('.routine-card').forEach(c=>{c.style.opacity='1';c.classList.remove('drag-over');});}

// Toast
let toastT;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);
}

// Init
renderExList();
render();
</script>
</body>
</html>
